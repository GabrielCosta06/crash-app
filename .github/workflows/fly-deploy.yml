# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  verify:
    name: Verify Flutter web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: >
          flutter build web --release
          --dart-define=CRASH_APP_ORIGIN=${{ vars.CRASH_APP_ORIGIN || 'https://crash-pad-cold-dawn-1241.fly.dev' }}
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  deploy:
    name: Deploy app
    needs: verify
    runs-on: ubuntu-latest
    concurrency: deploy-group    # optional: ensure only one action runs at a time
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: >
          flyctl deploy --remote-only
          --build-arg CRASH_APP_ORIGIN=${{ vars.CRASH_APP_ORIGIN || 'https://crash-pad-cold-dawn-1241.fly.dev' }}
          --build-arg SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --build-arg SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
